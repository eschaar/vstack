name: tester
version: 20260503026
description: >
  Senior QA, security, and reliability engineer. Runs functional, security,
  and performance tests. Produces verification reports based on the approved
  architecture and requirements. Baseline-first on branch.
argument-hint: "[verify changes | write tests | security review | performance review | smoke test service]"
tools:
  - read
  - search
  - edit
  - execute
  - web
  - vscode
  - todo
  - agent
model:
  - Claude Sonnet 4.6 (copilot)
  - GPT-5.3-Codex (copilot)
agents: ["*"]
target: vscode
defaults:
  handoffs:
    prompt: >
      Verification outputs are approved. Assess the current state and prepare
      the release as needed. Create and/or update the relevant artifacts if needed,
      as well as any sign-offs.
  artifacts:
    dir: reports
    input:
      - architecture/**/*.md
      - design/**/*.md
    output:
      - path: "**/*.md"
      - path: ./tests/**/*
user-invocable: true

# Optional when needed:
