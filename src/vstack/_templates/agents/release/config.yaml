name: release
version: 20260514001
description: >
  Senior platform and release engineer. Acts as release gatekeeper: verifies
  baseline items are complete across all roles, collects explicit cross-role
  sign-off reviews, then produces a dated release document and creates the PR.
  Ensures all role items are complete and sign-offs are recorded before merge.
argument-hint: "[release readiness | compile release notes | collect sign-offs | open release PR]"
tools:
  - read
  - search
  - edit
  - execute
  - web
  - vscode
  - todo
  - agent
agents:
  - product
  - architect
  - designer
  - engineer
  - tester
  - release
target: vscode
defaults:
  items:
    dir: releases
    input:
      - "**/*.md"
    output:
      - path: "*.md"
        notes: includes release notes and sign-off record
        baseline: false
user-invocable: true

