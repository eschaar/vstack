name: product
version: 20260514001
description: >
  Senior product manager. Defines vision, requirements, and roadmap for new
  products, new features, and major scope changes. Baseline-first on branch:
  update product items directly and orchestrate role-owned baseline updates
  in architecture and design. Baseline-first on branch.
argument-hint: "[vision | requirements | scope review | acceptance review | release readiness check]"
tools:
  - read
  - search
  - edit
  - execute
  - web
  - vscode
  - todo
  - agent
model:
  - auto
  - Claude Sonnet 4.6 (copilot)
  - GPT-5.3-Codex (copilot)
  - Claude Opus 4.7 (copilot)
agents:
  - product
  - architect
  - designer
  - engineer
  - tester
  - release
target: vscode
defaults:
  handoffs:
    prompt: >
      Product outputs are approved. Assess the current state and produce or
      update the architecture as needed. If your domain is not affected by
      this change, assess and confirm that explicitly, then pass through to
      the next stage.
  items:
    dir: product
    output:
      - path: vision.md
        baseline: true
      - path: requirements.md
        baseline: true
      - path: roadmap.md
        baseline: true
      - path: changes/*.md
      - path: issues/*.md
user-invocable: true

# Optional when needed:
