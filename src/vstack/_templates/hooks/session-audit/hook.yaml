  userPromptSubmitted:
    - type: command
      description: |
        Centrally log prompt events with configurable verbosity.
      bash: |
        script_start_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_start_ms" ]; then
          script_start_ms="$(( $(date +%s) * 1000 ))"
        fi
        input="$(cat)"
        log_level="${VSTACK_HOOKS_LOG_LEVEL:-minimal}"
        log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
        log_dir="$log_root/$(date -u +%Y%m%d)"
        mkdir -p "$log_dir"
        if [ "$log_level" = "off" ]; then
          exit 0
        fi
        if [ "$log_level" = "verbose" ]; then
          printf '%s\n' "$input" >> "$log_dir/hook-user-prompt.log"
          exit 0
        fi
        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        bytes="$(printf '%s' "$input" | wc -c | tr -d ' ')"
        est_tokens="$(( (bytes + 3) / 4 ))"
        extract_json_string() {
          key="$1"
          printf '%s' "$input" | sed -n "s/.*\"${key}\"[[:space:]]*:[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" | head -n1
        }
        prompt_text="$(extract_json_string prompt)"
        if [ -z "$prompt_text" ]; then
          prompt_text="$(extract_json_string userPrompt)"
        fi
        if [ -z "$prompt_text" ]; then
          prompt_text="$(extract_json_string user_prompt)"
        fi
        if [ -z "$prompt_text" ]; then
          prompt_text="$(extract_json_string text)"
        fi
        if [ -z "$prompt_text" ]; then
          prompt_text="$(printf '%s' "$input" | sed -n 's/.*"prompt"[[:space:]]*:[[:space:]]*{[^}]*"text"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        slash_command="none"
        if [ -n "$prompt_text" ]; then
          slash_command_candidate="$(printf '%s' "$prompt_text" | sed -n 's#^/\([^[:space:]]*\).*$#/\1#p' | head -n1)"
          if [ -n "$slash_command_candidate" ]; then
            slash_command="$slash_command_candidate"
          fi
        fi
        script_end_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_end_ms" ]; then
          script_end_ms="$(( $(date +%s) * 1000 ))"
        fi
        hook_execution_ms="$((script_end_ms - script_start_ms))"
        printf '{"timestamp":"%s","event":"userPromptSubmitted","slash_command":"%s","size_bytes":%s,"estimated_tokens":%s,"hook_execution_ms":%s}\n' "$ts" "$slash_command" "$bytes" "$est_tokens" "$hook_execution_ms" >> "$log_dir/hook-user-prompt.log"
      powershell: |
        $inputText = [Console]::In.ReadToEnd()
        $logLevel = if ($env:VSTACK_HOOKS_LOG_LEVEL) { $env:VSTACK_HOOKS_LOG_LEVEL } else { 'minimal' }
        $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
        $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
        New-Item -ItemType Directory -Force -Path $logDir | Out-Null
        if ($logLevel -eq 'off') {
          exit 0
        }
        if ($logLevel -eq 'verbose') {
          Add-Content -Path (Join-Path $logDir 'hook-user-prompt.log') -Value $inputText
          exit 0
        }
        $scriptStart = Get-Date
        function Get-PathValue {
          param([object]$Object, [string]$Path)
          $current = $Object
          foreach ($part in $Path.Split('.')) {
            if ($null -eq $current) {
              return $null
            }
            $prop = $current.PSObject.Properties[$part]
            if ($null -eq $prop) {
              return $null
            }
            $current = $prop.Value
          }
          return $current
        }
        function Get-FirstString {
          param([object]$Object, [string[]]$Paths)
          foreach ($path in $Paths) {
            $value = Get-PathValue -Object $Object -Path $path
            if ($null -ne $value -and [string]$value -ne '') {
              return [string]$value
            }
          }
          return $null
        }
        $slashCommand = 'none'
        try {
          $payload = $inputText | ConvertFrom-Json -ErrorAction Stop
          $promptText = Get-FirstString -Object $payload -Paths @('prompt', 'userPrompt', 'user_prompt', 'text', 'message.text', 'prompt.text')
          if ($promptText -and $promptText -match '^/([^\s]+)') {
            $slashCommand = "/$($Matches[1])"
          }
        } catch {
        }
        $hookExecutionMs = [int][Math]::Max(0, ((Get-Date) - $scriptStart).TotalMilliseconds)
        $record = @{ timestamp = (Get-Date).ToUniversalTime().ToString('o'); event = 'userPromptSubmitted'; slash_command = $slashCommand; size_bytes = $inputText.Length; estimated_tokens = [int][math]::Ceiling($inputText.Length / 4.0); hook_execution_ms = $hookExecutionMs } | ConvertTo-Json -Compress
        Add-Content -Path (Join-Path $logDir 'hook-user-prompt.log') -Value $record
      cwd: "."
      timeoutSec: 5

