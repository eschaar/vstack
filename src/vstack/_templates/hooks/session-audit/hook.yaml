version: 20260514002

metadata:
  name: session-audit
  description: |
    Records session boundaries plus prompt and tool telemetry to
    structured JSONL logs in .vstack/logs/ for audit and diagnostics.
  log:
    retention_days: 7
  purpose: audit
  security_level: low
  mode_default: audit
  execution_context: copilot-hook-runtime
  dependencies:
    required: []
    optional: []

hooks:
  preToolUse:
    - type: command
      description: |
        Centrally log tool call requests with size and estimated tokens.
      bash: |
        script_start_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_start_ms" ]; then
          script_start_ms="$(( $(date +%s) * 1000 ))"
        fi
        input="$(cat)"
        log_level="${VSTACK_HOOKS_LOG_LEVEL:-minimal}"
        log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
        log_dir="$log_root/$(date -u +%Y%m%d)"
        mkdir -p "$log_dir"
        if [ "$log_level" = "off" ]; then
          exit 0
        fi
        if [ "$log_level" = "verbose" ]; then
          printf '%s\n' "$input" >> "$log_dir/hook-tool-use.log"
          exit 0
        fi
        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        bytes="$(printf '%s' "$input" | wc -c | tr -d ' ')"
        est_tokens="$(( (bytes + 3) / 4 ))"
        extract_json_string() {
          key="$1"
          printf '%s' "$input" | sed -n "s/.*\"${key}\"[[:space:]]*:[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" | head -n1
        }
        tool_name="$(extract_json_string toolName)"
        if [ -z "$tool_name" ]; then
          tool_name="$(extract_json_string tool_name)"
        fi
        if [ -z "$tool_name" ]; then
          tool_name="$(extract_json_string recipient_name)"
        fi
        if [ -z "$tool_name" ]; then
          tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        if [ -z "$tool_name" ]; then
          tool_name="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        if [ -z "$tool_name" ]; then
          tool_name="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"toolName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        if [ -z "$tool_name" ]; then
          tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        if [ -z "$tool_name" ]; then
          tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"tool_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        if [ -z "$tool_name" ]; then
          tool_name="$(printf '%s' "$input" | grep -Eo '[A-Za-z_][A-Za-z0-9_]*\.[A-Za-z_][A-Za-z0-9_]*' | head -n1)"
        fi
        if [ -z "$tool_name" ]; then
          tool_name="unknown"
        fi
        tool_call_id="$(extract_json_string toolCallId)"
        if [ -z "$tool_call_id" ]; then
          tool_call_id="$(extract_json_string tool_call_id)"
        fi
        if [ -z "$tool_call_id" ]; then
          tool_call_id="$(extract_json_string callId)"
        fi
        if [ -z "$tool_call_id" ]; then
          tool_call_id="$(extract_json_string call_id)"
        fi
        if [ -z "$tool_call_id" ]; then
          tool_call_id="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        if [ -z "$tool_call_id" ]; then
          tool_call_id="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        fi
        if [ -z "$tool_call_id" ]; then
          tool_call_id="unknown"
        fi
        script_end_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_end_ms" ]; then
          script_end_ms="$(( $(date +%s) * 1000 ))"
        fi
        hook_execution_ms="$((script_end_ms - script_start_ms))"
        printf '{"timestamp":"%s","event":"preToolUse","tool_name":"%s","tool_call_id":"%s","size_bytes":%s,"estimated_tokens":%s,"hook_execution_ms":%s}\n' "$ts" "$tool_name" "$tool_call_id" "$bytes" "$est_tokens" "$hook_execution_ms" >> "$log_dir/hook-tool-use.log"
      powershell: |
        $inputText = [Console]::In.ReadToEnd()
        $logLevel = if ($env:VSTACK_HOOKS_LOG_LEVEL) { $env:VSTACK_HOOKS_LOG_LEVEL } else { 'minimal' }
        $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
        $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
        New-Item -ItemType Directory -Force -Path $logDir | Out-Null
        if ($logLevel -eq 'off') {
          exit 0
        }
        if ($logLevel -eq 'verbose') {
          Add-Content -Path (Join-Path $logDir 'hook-tool-use.log') -Value $inputText
          exit 0
        }
        $scriptStart = Get-Date
        function Get-PathValue {
          param([object]$Object, [string]$Path)
          $current = $Object
          foreach ($part in $Path.Split('.')) {
            if ($null -eq $current) {
              return $null
            }
            $prop = $current.PSObject.Properties[$part]
            if ($null -eq $prop) {
              return $null
            }
            $current = $prop.Value
          }
          return $current
        }
        function Get-FirstString {
          param([object]$Object, [string[]]$Paths)
          foreach ($path in $Paths) {
            $value = Get-PathValue -Object $Object -Path $path
            if ($null -ne $value -and [string]$value -ne '') {
              return [string]$value
            }
          }
          return $null
        }
        $toolName = 'unknown'
        $toolCallId = 'unknown'
        try {
          $payload = $inputText | ConvertFrom-Json -ErrorAction Stop
          $toolNameCandidate = Get-FirstString -Object $payload -Paths @('toolName', 'tool_name', 'recipient_name', 'tool.name', 'toolCall.name', 'toolCall.toolName', 'tool_call.name', 'tool_call.tool_name')
          if ($toolNameCandidate) {
            $toolName = $toolNameCandidate
          }
          $toolCallIdCandidate = Get-FirstString -Object $payload -Paths @('toolCallId', 'tool_call_id', 'callId', 'call_id', 'toolCall.id', 'tool_call.id')
          if ($toolCallIdCandidate) {
            $toolCallId = $toolCallIdCandidate
          }
        } catch {
        }
        if ($toolName -eq 'unknown') {
          $toolNameMatch = [regex]::Match($inputText, '[A-Za-z_][A-Za-z0-9_]*\.[A-Za-z_][A-Za-z0-9_]*')
          if ($toolNameMatch.Success) {
            $toolName = $toolNameMatch.Value
          }
        }
        $hookExecutionMs = [int][Math]::Max(0, ((Get-Date) - $scriptStart).TotalMilliseconds)
        $record = @{
          timestamp = (Get-Date).ToUniversalTime().ToString('o')
          event = 'preToolUse'
          tool_name = $toolName
          tool_call_id = $toolCallId
          size_bytes = $inputText.Length
          estimated_tokens = [int][math]::Ceiling($inputText.Length / 4.0)
          hook_execution_ms = $hookExecutionMs
        } | ConvertTo-Json -Compress
        Add-Content -Path (Join-Path $logDir 'hook-tool-use.log') -Value $record
      cwd: "."
      timeoutSec: 5

