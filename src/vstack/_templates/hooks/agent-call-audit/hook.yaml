version: 20260514002

metadata:
  name: agent-call-audit
  description: |
    Records best-effort agent and subagent call flow telemetry for
    session boundaries and tool call events.

    Maintains an internal unknown-events TSV accumulator to emit per-session
    `unknownSummary` records and assess telemetry/parser quality over time.
  log:
    retention_days: 7
  purpose: audit
  security_level: low
  mode_default: audit
  execution_context: copilot-hook-runtime
  dependencies:
    required: []
    optional: []

hooks:
  sessionStart:
    - type: command
      description: |
        Log session start with best-effort actor identity and model metadata.
      bash: |
        script_start_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_start_ms" ]; then
          script_start_ms="$(( $(date +%s) * 1000 ))"
        fi
        input="$(cat)"
        log_level="${VSTACK_HOOKS_LOG_LEVEL:-minimal}"
        log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
        retention_days="${VSTACK_HOOK_RETENTION_DAYS:-7}"
        if ! printf '%s' "$retention_days" | grep -Eq '^[1-9][0-9]*$'; then
          retention_days=7
        fi
        if [ -d "$log_root" ]; then
          cutoff_day="$(date -u -d "$retention_days days ago" +%Y%m%d 2>/dev/null || true)"
          if [ -n "$cutoff_day" ]; then
            for day_dir in "$log_root"/*; do
              [ -d "$day_dir" ] || continue
              day_name="$(basename "$day_dir")"
              case "$day_name" in
                [0-9][0-9][0-9][0-9][0-1][0-9][0-3][0-9]) ;;
                *) continue ;;
              esac
              if [ "$day_name" -lt "$cutoff_day" ]; then
                rm -rf "$day_dir" || true
              fi
            done
          fi
        fi
        log_dir="$log_root/$(date -u +%Y%m%d)"
        mkdir -p "$log_dir"
        if [ "$log_level" = "off" ]; then
          exit 0
        fi
        if [ "$log_level" = "verbose" ]; then
          printf '%s\n' "$input" >> "$log_dir/hook-agent-call.log"
          exit 0
        fi

        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        unknown_events_file="$log_dir/hook-agent-call-unknown-events.tsv"

        extract_json_string() {
          key="$1"
          printf '%s' "$input" | sed -n "s/.*\"${key}\"[[:space:]]*:[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" | head -n1
        }

        increment_unknown_event() {
          sid="$1"
          reason="$2"
          tmp_file="$unknown_events_file.tmp.$$"
          if [ -f "$unknown_events_file" ]; then
            awk -F '\t' -v sid="$sid" -v reason="$reason" 'BEGIN { OFS="\t" }
              NF >= 2 {
                key = $1 SUBSEP $2
                count = 1
                if (NF >= 3 && $3 ~ /^[0-9]+$/) {
                  count = $3 + 0
                }
                counts[key] += count
              }
              END {
                target = sid SUBSEP reason
                counts[target] += 1
                for (k in counts) {
                  split(k, parts, SUBSEP)
                  print parts[1], parts[2], counts[k]
                }
              }' "$unknown_events_file" > "$tmp_file" && mv "$tmp_file" "$unknown_events_file"
          else
            printf '%s\t%s\t1\n' "$sid" "$reason" > "$unknown_events_file"
          fi
        }

        session_id="$(extract_json_string sessionId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string session_id)"
        [ -z "$session_id" ] && session_id="$(extract_json_string conversationId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string conversation_id)"
        [ -z "$session_id" ] && session_id="$(extract_json_string chatId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string chat_id)"
        [ -z "$session_id" ] && session_id="unknown-session"

        actor_name="$(extract_json_string actorName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string actor_name)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string subagentName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string subagent_name)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string agentName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string agent_name)"
        [ -z "$actor_name" ] && actor_name="unknown"

        actor_type="$(extract_json_string actorType)"
        [ -z "$actor_type" ] && actor_type="$(extract_json_string actor_type)"
        if [ -z "$actor_type" ]; then
          if printf '%s' "$actor_name" | grep -qi 'subagent'; then
            actor_type="subagent"
          elif [ "$actor_name" != "unknown" ]; then
            actor_type="agent"
          else
            actor_type="unknown"
          fi
        fi

        model_used="$(extract_json_string model)"
        [ -z "$model_used" ] && model_used="$(extract_json_string modelName)"
        [ -z "$model_used" ] && model_used="$(extract_json_string model_name)"
        [ -z "$model_used" ] && model_used="$(extract_json_string toolModel)"
        [ -z "$model_used" ] && model_used="$(extract_json_string tool_model)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="unknown"

        if [ "$actor_name" = "unknown" ]; then
          increment_unknown_event "$session_id" "sessionStart_unknown_actor"
          exit 0
        fi

        bytes="$(printf '%s' "$input" | wc -c | tr -d ' ')"
        est_tokens="$(( (bytes + 3) / 4 ))"
        script_end_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_end_ms" ]; then
          script_end_ms="$(( $(date +%s) * 1000 ))"
        fi
        hook_execution_ms="$((script_end_ms - script_start_ms))"

        printf '{"timestamp":"%s","event":"sessionStart","session_id":"%s","actor_name":"%s","actor_type":"%s","model_used":"%s","size_bytes":%s,"estimated_tokens":%s,"hook_execution_ms":%s}\n' \
          "$ts" "$session_id" "$actor_name" "$actor_type" "$model_used" "$bytes" "$est_tokens" "$hook_execution_ms" >> "$log_dir/hook-agent-call.log"
      powershell: |
        $inputText = [Console]::In.ReadToEnd()
        $logLevel = if ($env:VSTACK_HOOKS_LOG_LEVEL) { $env:VSTACK_HOOKS_LOG_LEVEL } else { 'minimal' }
        $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
        $retentionDaysRaw = if ($env:VSTACK_HOOK_RETENTION_DAYS) { $env:VSTACK_HOOK_RETENTION_DAYS } else { '7' }
        $retentionDays = 7
        if (-not ([int]::TryParse([string]$retentionDaysRaw, [ref]$retentionDays) -and $retentionDays -gt 0)) {
          $retentionDays = 7
        }
        try {
          if (Test-Path -LiteralPath $logRoot) {
            $cutoffDay = (Get-Date).ToUniversalTime().AddDays(-$retentionDays).ToString('yyyyMMdd')
            Get-ChildItem -LiteralPath $logRoot -Directory -ErrorAction Stop |
              Where-Object { $_.Name -match '^\d{8}$' -and $_.Name -lt $cutoffDay } |
              ForEach-Object { Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
          }
        } catch {}
        $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
        New-Item -ItemType Directory -Force -Path $logDir | Out-Null
        if ($logLevel -eq 'off') { exit 0 }
        if ($logLevel -eq 'verbose') {
          Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $inputText
          exit 0
        }

        $scriptStart = Get-Date
        $unknownEventsPath = Join-Path $logDir 'hook-agent-call-unknown-events.tsv'

        function Get-PathValue {
          param([object]$Object, [string]$Path)
          $current = $Object
          foreach ($part in $Path.Split('.')) {
            if ($null -eq $current) { return $null }
            $prop = $current.PSObject.Properties[$part]
            if ($null -eq $prop) { return $null }
            $current = $prop.Value
          }
          return $current
        }

        function Get-FirstString {
          param([object]$Object, [string[]]$Paths)
          foreach ($path in $Paths) {
            $value = Get-PathValue -Object $Object -Path $path
            if ($null -ne $value -and [string]$value -ne '') { return [string]$value }
          }
          return $null
        }

        function Add-UnknownEventCounter {
          param(
            [string]$Path,
            [string]$SessionId,
            [string]$Reason
          )

          $counts = @{}
          if (Test-Path $Path) {
            foreach ($line in (Get-Content -Path $Path)) {
              if ([string]::IsNullOrWhiteSpace($line)) { continue }
              $parts = $line -split "`t"
              if ($parts.Count -lt 2) { continue }

              $sid = [string]$parts[0]
              $why = [string]$parts[1]
              $count = 1
              if ($parts.Count -ge 3) {
                $parsedCount = 0
                if ([int]::TryParse([string]$parts[2], [ref]$parsedCount)) {
                  $count = [int][Math]::Max(0, $parsedCount)
                }
              }

              $key = "$sid`t$why"
              if (-not $counts.ContainsKey($key)) { $counts[$key] = 0 }
              $counts[$key] += $count
            }
          }

          $target = "$SessionId`t$Reason"
          if (-not $counts.ContainsKey($target)) { $counts[$target] = 0 }
          $counts[$target] += 1

          $rows = foreach ($entry in ($counts.GetEnumerator() | Sort-Object Name)) {
            "{0}`t{1}" -f $entry.Name, $entry.Value
          }
          Set-Content -Path $Path -Value $rows
        }

        $payload = $null
        try { $payload = $inputText | ConvertFrom-Json -ErrorAction Stop } catch {}

        $sessionId = 'unknown-session'
        $actorName = 'unknown'
        $actorType = 'unknown'
        $modelUsed = 'unknown'

        if ($null -ne $payload) {
          $sessionIdCandidate = Get-FirstString -Object $payload -Paths @('sessionId', 'session_id', 'conversationId', 'conversation_id', 'chatId', 'chat_id')
          if ($sessionIdCandidate) { $sessionId = $sessionIdCandidate }

          $actorNameCandidate = Get-FirstString -Object $payload -Paths @('actorName', 'actor_name', 'subagentName', 'subagent_name', 'agentName', 'agent_name')
          if ($actorNameCandidate) { $actorName = $actorNameCandidate }

          $actorTypeCandidate = Get-FirstString -Object $payload -Paths @('actorType', 'actor_type')
          if ($actorTypeCandidate) { $actorType = $actorTypeCandidate }

          $modelCandidate = Get-FirstString -Object $payload -Paths @('model', 'modelName', 'model_name', 'toolModel', 'tool_model', 'toolCall.model', 'tool_call.model', 'arguments.model', 'arguments.modelName', 'arguments.model_name', 'args.model', 'args.modelName', 'args.model_name', 'tool.arguments.model', 'tool.arguments.modelName', 'tool.arguments.model_name', 'toolCall.arguments.model', 'toolCall.arguments.modelName', 'toolCall.arguments.model_name', 'tool_call.arguments.model', 'tool_call.arguments.modelName', 'tool_call.arguments.model_name')
          if ($modelCandidate) { $modelUsed = $modelCandidate }
        }

        if ($actorType -eq 'unknown') {
          if ($actorName -match 'subagent') {
            $actorType = 'subagent'
          } elseif ($actorName -ne 'unknown') {
            $actorType = 'agent'
          }
        }

        if ($actorName -eq 'unknown') {
          Add-UnknownEventCounter -Path $unknownEventsPath -SessionId $sessionId -Reason 'sessionStart_unknown_actor'
          exit 0
        }

        $sizeBytes = [System.Text.Encoding]::UTF8.GetByteCount($inputText)
        $hookExecutionMs = [int][Math]::Max(0, ((Get-Date) - $scriptStart).TotalMilliseconds)
        $record = @{
          timestamp = (Get-Date).ToUniversalTime().ToString('o')
          event = 'sessionStart'
          session_id = $sessionId
          actor_name = $actorName
          actor_type = $actorType
          model_used = $modelUsed
          size_bytes = $sizeBytes
          estimated_tokens = [int][math]::Ceiling($sizeBytes / 4.0)
          hook_execution_ms = $hookExecutionMs
        } | ConvertTo-Json -Compress
        Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $record
      cwd: "."
      timeoutSec: 5

  sessionEnd:
    - type: command
      description: |
        Log session end with best-effort actor identity and unknown-summary counters.
      bash: |
        script_start_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_start_ms" ]; then
          script_start_ms="$(( $(date +%s) * 1000 ))"
        fi
        input="$(cat)"
        log_level="${VSTACK_HOOKS_LOG_LEVEL:-minimal}"
        log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
        retention_days="${VSTACK_HOOK_RETENTION_DAYS:-7}"
        if ! printf '%s' "$retention_days" | grep -Eq '^[1-9][0-9]*$'; then
          retention_days=7
        fi
        if [ -d "$log_root" ]; then
          cutoff_day="$(date -u -d "$retention_days days ago" +%Y%m%d 2>/dev/null || true)"
          if [ -n "$cutoff_day" ]; then
            for day_dir in "$log_root"/*; do
              [ -d "$day_dir" ] || continue
              day_name="$(basename "$day_dir")"
              case "$day_name" in
                [0-9][0-9][0-9][0-9][0-1][0-9][0-3][0-9]) ;;
                *) continue ;;
              esac
              if [ "$day_name" -lt "$cutoff_day" ]; then
                rm -rf "$day_dir" || true
              fi
            done
          fi
        fi
        log_dir="$log_root/$(date -u +%Y%m%d)"
        mkdir -p "$log_dir"
        if [ "$log_level" = "off" ]; then
          exit 0
        fi
        if [ "$log_level" = "verbose" ]; then
          printf '%s\n' "$input" >> "$log_dir/hook-agent-call.log"
          exit 0
        fi

        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        unknown_events_file="$log_dir/hook-agent-call-unknown-events.tsv"

        extract_json_string() {
          key="$1"
          printf '%s' "$input" | sed -n "s/.*\"${key}\"[[:space:]]*:[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" | head -n1
        }

        increment_unknown_event() {
          sid="$1"
          reason="$2"
          tmp_file="$unknown_events_file.tmp.$$"
          if [ -f "$unknown_events_file" ]; then
            awk -F '\t' -v sid="$sid" -v reason="$reason" 'BEGIN { OFS="\t" }
              NF >= 2 {
                key = $1 SUBSEP $2
                count = 1
                if (NF >= 3 && $3 ~ /^[0-9]+$/) {
                  count = $3 + 0
                }
                counts[key] += count
              }
              END {
                target = sid SUBSEP reason
                counts[target] += 1
                for (k in counts) {
                  split(k, parts, SUBSEP)
                  print parts[1], parts[2], counts[k]
                }
              }' "$unknown_events_file" > "$tmp_file" && mv "$tmp_file" "$unknown_events_file"
          else
            printf '%s\t%s\t1\n' "$sid" "$reason" > "$unknown_events_file"
          fi
        }

        session_id="$(extract_json_string sessionId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string session_id)"
        [ -z "$session_id" ] && session_id="$(extract_json_string conversationId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string conversation_id)"
        [ -z "$session_id" ] && session_id="$(extract_json_string chatId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string chat_id)"
        [ -z "$session_id" ] && session_id="unknown-session"

        actor_name="$(extract_json_string actorName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string actor_name)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string subagentName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string subagent_name)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string agentName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string agent_name)"
        [ -z "$actor_name" ] && actor_name="unknown"

        actor_type="$(extract_json_string actorType)"
        [ -z "$actor_type" ] && actor_type="$(extract_json_string actor_type)"
        if [ -z "$actor_type" ]; then
          if printf '%s' "$actor_name" | grep -qi 'subagent'; then
            actor_type="subagent"
          elif [ "$actor_name" != "unknown" ]; then
            actor_type="agent"
          else
            actor_type="unknown"
          fi
        fi

        model_used="$(extract_json_string model)"
        [ -z "$model_used" ] && model_used="$(extract_json_string modelName)"
        [ -z "$model_used" ] && model_used="$(extract_json_string model_name)"
        [ -z "$model_used" ] && model_used="$(extract_json_string toolModel)"
        [ -z "$model_used" ] && model_used="$(extract_json_string tool_model)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="unknown"

        if [ "$actor_name" = "unknown" ]; then
          increment_unknown_event "$session_id" "sessionEnd_unknown_actor"
        else
          bytes="$(printf '%s' "$input" | wc -c | tr -d ' ')"
          est_tokens="$(( (bytes + 3) / 4 ))"
          script_end_ms="$(date +%s%3N 2>/dev/null || true)"
          if [ -z "$script_end_ms" ]; then
            script_end_ms="$(( $(date +%s) * 1000 ))"
          fi
          hook_execution_ms="$((script_end_ms - script_start_ms))"

          printf '{"timestamp":"%s","event":"sessionEnd","session_id":"%s","actor_name":"%s","actor_type":"%s","model_used":"%s","size_bytes":%s,"estimated_tokens":%s,"hook_execution_ms":%s}\n' \
            "$ts" "$session_id" "$actor_name" "$actor_type" "$model_used" "$bytes" "$est_tokens" "$hook_execution_ms" >> "$log_dir/hook-agent-call.log"
        fi

        if [ -f "$unknown_events_file" ]; then
          unknown_total="$(awk -F '\t' -v sid="$session_id" '$1==sid {count=1; if (NF>=3 && $3 ~ /^[0-9]+$/) count=$3+0; total+=count} END {print total+0}' "$unknown_events_file")"
          if [ "$unknown_total" -gt 0 ]; then
            unknown_breakdown="$(awk -F '\t' -v sid="$session_id" '$1==sid {count=1; if (NF>=3 && $3 ~ /^[0-9]+$/) count=$3+0; counts[$2]+=count} END {for (k in counts) {if (out != "") out=out ";"; out=out k "=" counts[k]} print out}' "$unknown_events_file")"
            printf '{"timestamp":"%s","event":"unknownSummary","session_id":"%s","unknown_total":%s,"unknown_breakdown":"%s","model_used":"%s"}\n' \
              "$ts" "$session_id" "$unknown_total" "$unknown_breakdown" "$model_used" >> "$log_dir/hook-agent-call.log"
          fi
          tmp_file="$unknown_events_file.tmp.$$"
          awk -F '\t' -v sid="$session_id" 'BEGIN { OFS="\t" } $1!=sid && NF>=2 {count=1; if (NF>=3 && $3 ~ /^[0-9]+$/) count=$3+0; print $1, $2, count}' "$unknown_events_file" > "$tmp_file" && mv "$tmp_file" "$unknown_events_file"
        fi
      powershell: |
        $inputText = [Console]::In.ReadToEnd()
        $logLevel = if ($env:VSTACK_HOOKS_LOG_LEVEL) { $env:VSTACK_HOOKS_LOG_LEVEL } else { 'minimal' }
        $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
        $retentionDaysRaw = if ($env:VSTACK_HOOK_RETENTION_DAYS) { $env:VSTACK_HOOK_RETENTION_DAYS } else { '7' }
        $retentionDays = 7
        if (-not ([int]::TryParse([string]$retentionDaysRaw, [ref]$retentionDays) -and $retentionDays -gt 0)) {
          $retentionDays = 7
        }
        try {
          if (Test-Path -LiteralPath $logRoot) {
            $cutoffDay = (Get-Date).ToUniversalTime().AddDays(-$retentionDays).ToString('yyyyMMdd')
            Get-ChildItem -LiteralPath $logRoot -Directory -ErrorAction Stop |
              Where-Object { $_.Name -match '^\d{8}$' -and $_.Name -lt $cutoffDay } |
              ForEach-Object { Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
          }
        } catch {}
        $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
        New-Item -ItemType Directory -Force -Path $logDir | Out-Null
        if ($logLevel -eq 'off') { exit 0 }
        if ($logLevel -eq 'verbose') {
          Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $inputText
          exit 0
        }

        $scriptStart = Get-Date
        $unknownEventsPath = Join-Path $logDir 'hook-agent-call-unknown-events.tsv'

        function Get-PathValue {
          param([object]$Object, [string]$Path)
          $current = $Object
          foreach ($part in $Path.Split('.')) {
            if ($null -eq $current) { return $null }
            $prop = $current.PSObject.Properties[$part]
            if ($null -eq $prop) { return $null }
            $current = $prop.Value
          }
          return $current
        }

        function Get-FirstString {
          param([object]$Object, [string[]]$Paths)
          foreach ($path in $Paths) {
            $value = Get-PathValue -Object $Object -Path $path
            if ($null -ne $value -and [string]$value -ne '') { return [string]$value }
          }
          return $null
        }

        function Add-UnknownEventCounter {
          param(
            [string]$Path,
            [string]$SessionId,
            [string]$Reason
          )

          $counts = @{}
          if (Test-Path $Path) {
            foreach ($line in (Get-Content -Path $Path)) {
              if ([string]::IsNullOrWhiteSpace($line)) { continue }
              $parts = $line -split "`t"
              if ($parts.Count -lt 2) { continue }

              $sid = [string]$parts[0]
              $why = [string]$parts[1]
              $count = 1
              if ($parts.Count -ge 3) {
                $parsedCount = 0
                if ([int]::TryParse([string]$parts[2], [ref]$parsedCount)) {
                  $count = [int][Math]::Max(0, $parsedCount)
                }
              }

              $key = "$sid`t$why"
              if (-not $counts.ContainsKey($key)) { $counts[$key] = 0 }
              $counts[$key] += $count
            }
          }

          $target = "$SessionId`t$Reason"
          if (-not $counts.ContainsKey($target)) { $counts[$target] = 0 }
          $counts[$target] += 1

          $rows = foreach ($entry in ($counts.GetEnumerator() | Sort-Object Name)) {
            "{0}`t{1}" -f $entry.Name, $entry.Value
          }
          Set-Content -Path $Path -Value $rows
        }

        $payload = $null
        try { $payload = $inputText | ConvertFrom-Json -ErrorAction Stop } catch {}

        $sessionId = 'unknown-session'
        $actorName = 'unknown'
        $actorType = 'unknown'
        $modelUsed = 'unknown'

        if ($null -ne $payload) {
          $sessionIdCandidate = Get-FirstString -Object $payload -Paths @('sessionId', 'session_id', 'conversationId', 'conversation_id', 'chatId', 'chat_id')
          if ($sessionIdCandidate) { $sessionId = $sessionIdCandidate }

          $actorNameCandidate = Get-FirstString -Object $payload -Paths @('actorName', 'actor_name', 'subagentName', 'subagent_name', 'agentName', 'agent_name')
          if ($actorNameCandidate) { $actorName = $actorNameCandidate }

          $actorTypeCandidate = Get-FirstString -Object $payload -Paths @('actorType', 'actor_type')
          if ($actorTypeCandidate) { $actorType = $actorTypeCandidate }

          $modelCandidate = Get-FirstString -Object $payload -Paths @('model', 'modelName', 'model_name', 'toolModel', 'tool_model', 'toolCall.model', 'tool_call.model', 'arguments.model', 'arguments.modelName', 'arguments.model_name', 'args.model', 'args.modelName', 'args.model_name', 'tool.arguments.model', 'tool.arguments.modelName', 'tool.arguments.model_name', 'toolCall.arguments.model', 'toolCall.arguments.modelName', 'toolCall.arguments.model_name', 'tool_call.arguments.model', 'tool_call.arguments.modelName', 'tool_call.arguments.model_name')
          if ($modelCandidate) { $modelUsed = $modelCandidate }
        }

        if ($actorType -eq 'unknown') {
          if ($actorName -match 'subagent') {
            $actorType = 'subagent'
          } elseif ($actorName -ne 'unknown') {
            $actorType = 'agent'
          }
        }

        if ($actorName -eq 'unknown') {
          Add-UnknownEventCounter -Path $unknownEventsPath -SessionId $sessionId -Reason 'sessionEnd_unknown_actor'
        } else {
          $sizeBytes = [System.Text.Encoding]::UTF8.GetByteCount($inputText)
          $hookExecutionMs = [int][Math]::Max(0, ((Get-Date) - $scriptStart).TotalMilliseconds)
          $record = @{
            timestamp = (Get-Date).ToUniversalTime().ToString('o')
            event = 'sessionEnd'
            session_id = $sessionId
            actor_name = $actorName
            actor_type = $actorType
            model_used = $modelUsed
            size_bytes = $sizeBytes
            estimated_tokens = [int][math]::Ceiling($sizeBytes / 4.0)
            hook_execution_ms = $hookExecutionMs
          } | ConvertTo-Json -Compress
          Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $record
        }

        if (Test-Path $unknownEventsPath) {
          $matchingCounts = @{}
          $remainingCounts = @{}
          foreach ($line in (Get-Content -Path $unknownEventsPath)) {
            if ([string]::IsNullOrWhiteSpace($line)) { continue }
            $parts = $line -split "`t"
            if ($parts.Count -lt 2) { continue }

            $lineSessionId = [string]$parts[0]
            $reason = [string]$parts[1]
            $count = 1
            if ($parts.Count -ge 3) {
              $parsedCount = 0
              if ([int]::TryParse([string]$parts[2], [ref]$parsedCount)) {
                $count = [int][Math]::Max(0, $parsedCount)
              }
            }

            if ($lineSessionId -eq $sessionId) {
              if (-not $matchingCounts.ContainsKey($reason)) { $matchingCounts[$reason] = 0 }
              $matchingCounts[$reason] += $count
            } else {
              $remainingKey = "$lineSessionId`t$reason"
              if (-not $remainingCounts.ContainsKey($remainingKey)) { $remainingCounts[$remainingKey] = 0 }
              $remainingCounts[$remainingKey] += $count
            }
          }

          if ($matchingCounts.Count -gt 0) {
            $unknownTotal = 0
            $summaryPairs = @()
            foreach ($entry in ($matchingCounts.GetEnumerator() | Sort-Object Name)) {
              $unknownTotal += [int]$entry.Value
              $summaryPairs += ("{0}={1}" -f $entry.Name, $entry.Value)
            }
            $summary = $summaryPairs -join ';'
            $summaryRecord = @{
              timestamp = (Get-Date).ToUniversalTime().ToString('o')
              event = 'unknownSummary'
              session_id = $sessionId
              unknown_total = $unknownTotal
              unknown_breakdown = $summary
              model_used = $modelUsed
            } | ConvertTo-Json -Compress
            Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $summaryRecord
          }

          $remaining = @()
          foreach ($entry in ($remainingCounts.GetEnumerator() | Sort-Object Name)) {
            $remaining += ("{0}`t{1}" -f $entry.Name, $entry.Value)
          }
          Set-Content -Path $unknownEventsPath -Value $remaining
        }
      cwd: "."
      timeoutSec: 5

  preToolUse:
    - type: command
      description: |
        Log tool invocation requests with best-effort actor, delegation, and model metadata.
      bash: |
        script_start_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_start_ms" ]; then
          script_start_ms="$(( $(date +%s) * 1000 ))"
        fi
        input="$(cat)"
        log_level="${VSTACK_HOOKS_LOG_LEVEL:-minimal}"
        log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
        retention_days="${VSTACK_HOOK_RETENTION_DAYS:-7}"
        if ! printf '%s' "$retention_days" | grep -Eq '^[1-9][0-9]*$'; then
          retention_days=7
        fi
        if [ -d "$log_root" ]; then
          cutoff_day="$(date -u -d "$retention_days days ago" +%Y%m%d 2>/dev/null || true)"
          if [ -n "$cutoff_day" ]; then
            for day_dir in "$log_root"/*; do
              [ -d "$day_dir" ] || continue
              day_name="$(basename "$day_dir")"
              case "$day_name" in
                [0-9][0-9][0-9][0-9][0-1][0-9][0-3][0-9]) ;;
                *) continue ;;
              esac
              if [ "$day_name" -lt "$cutoff_day" ]; then
                rm -rf "$day_dir" || true
              fi
            done
          fi
        fi
        log_dir="$log_root/$(date -u +%Y%m%d)"
        mkdir -p "$log_dir"
        if [ "$log_level" = "off" ]; then
          exit 0
        fi
        if [ "$log_level" = "verbose" ]; then
          printf '%s\n' "$input" >> "$log_dir/hook-agent-call.log"
          exit 0
        fi

        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        unknown_events_file="$log_dir/hook-agent-call-unknown-events.tsv"

        extract_json_string() {
          key="$1"
          printf '%s' "$input" | sed -n "s/.*\"${key}\"[[:space:]]*:[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" | head -n1
        }

        increment_unknown_event() {
          sid="$1"
          reason="$2"
          tmp_file="$unknown_events_file.tmp.$$"
          if [ -f "$unknown_events_file" ]; then
            awk -F '\t' -v sid="$sid" -v reason="$reason" 'BEGIN { OFS="\t" }
              NF >= 2 {
                key = $1 SUBSEP $2
                count = 1
                if (NF >= 3 && $3 ~ /^[0-9]+$/) {
                  count = $3 + 0
                }
                counts[key] += count
              }
              END {
                target = sid SUBSEP reason
                counts[target] += 1
                for (k in counts) {
                  split(k, parts, SUBSEP)
                  print parts[1], parts[2], counts[k]
                }
              }' "$unknown_events_file" > "$tmp_file" && mv "$tmp_file" "$unknown_events_file"
          else
            printf '%s\t%s\t1\n' "$sid" "$reason" > "$unknown_events_file"
          fi
        }

        session_id="$(extract_json_string sessionId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string session_id)"
        [ -z "$session_id" ] && session_id="$(extract_json_string conversationId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string conversation_id)"
        [ -z "$session_id" ] && session_id="$(extract_json_string chatId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string chat_id)"
        [ -z "$session_id" ] && session_id="unknown-session"

        actor_name="$(extract_json_string actorName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string actor_name)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string subagentName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string subagent_name)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string agentName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string agent_name)"
        [ -z "$actor_name" ] && actor_name="unknown"

        actor_type="$(extract_json_string actorType)"
        [ -z "$actor_type" ] && actor_type="$(extract_json_string actor_type)"
        if [ -z "$actor_type" ]; then
          if printf '%s' "$actor_name" | grep -qi 'subagent'; then
            actor_type="subagent"
          elif [ "$actor_name" != "unknown" ]; then
            actor_type="agent"
          else
            actor_type="unknown"
          fi
        fi

        tool_name="$(extract_json_string toolName)"
        [ -z "$tool_name" ] && tool_name="$(extract_json_string tool_name)"
        [ -z "$tool_name" ] && tool_name="$(extract_json_string recipient_name)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"toolName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"tool_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | grep -Eo '[A-Za-z_][A-Za-z0-9_]*\.[A-Za-z_][A-Za-z0-9_]*' | head -n1)"
        [ -z "$tool_name" ] && tool_name="unknown"

        delegated_agent_name="unknown"
        if [ "$tool_name" = "runSubagent" ]; then
          delegated_agent_name="$(extract_json_string delegatedAgentName)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(extract_json_string delegated_agent_name)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(extract_json_string agentName)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(extract_json_string agent_name)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(printf '%s' "$input" | sed -n 's/.*"runSubagent"[[:space:]]*:[[:space:]]*{[^}]*"agentName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(printf '%s' "$input" | sed -n 's/.*"runSubagent"[[:space:]]*:[[:space:]]*{[^}]*"agent_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"agentName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"agent_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="unknown"
        fi

        tool_call_id="$(extract_json_string toolCallId)"
        [ -z "$tool_call_id" ] && tool_call_id="$(extract_json_string tool_call_id)"
        [ -z "$tool_call_id" ] && tool_call_id="$(extract_json_string callId)"
        [ -z "$tool_call_id" ] && tool_call_id="$(extract_json_string call_id)"
        [ -z "$tool_call_id" ] && tool_call_id="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_call_id" ] && tool_call_id="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_call_id" ] && tool_call_id="unknown"

        model_used="$(extract_json_string model)"
        [ -z "$model_used" ] && model_used="$(extract_json_string modelName)"
        [ -z "$model_used" ] && model_used="$(extract_json_string model_name)"
        [ -z "$model_used" ] && model_used="$(extract_json_string toolModel)"
        [ -z "$model_used" ] && model_used="$(extract_json_string tool_model)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="unknown"

        if [ "$actor_name" = "unknown" ] && [ "$delegated_agent_name" = "unknown" ] && [ "$tool_name" != "runSubagent" ]; then
          increment_unknown_event "$session_id" "preToolUse_unknown_context"
          exit 0
        fi

        event_name="preToolUse"
        if [ "$tool_name" = "runSubagent" ]; then
          event_name="delegationStart"
        fi

        bytes="$(printf '%s' "$input" | wc -c | tr -d ' ')"
        est_tokens="$(( (bytes + 3) / 4 ))"
        script_end_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_end_ms" ]; then
          script_end_ms="$(( $(date +%s) * 1000 ))"
        fi
        hook_execution_ms="$((script_end_ms - script_start_ms))"

        printf '{"timestamp":"%s","event":"%s","session_id":"%s","actor_name":"%s","actor_type":"%s","tool_name":"%s","delegated_agent_name":"%s","model_used":"%s","size_bytes":%s,"estimated_tokens":%s,"hook_execution_ms":%s}\n' \
          "$ts" "$event_name" "$session_id" "$actor_name" "$actor_type" "$tool_name" "$delegated_agent_name" "$model_used" "$bytes" "$est_tokens" "$hook_execution_ms" >> "$log_dir/hook-agent-call.log"
      powershell: |
        $inputText = [Console]::In.ReadToEnd()
        $logLevel = if ($env:VSTACK_HOOKS_LOG_LEVEL) { $env:VSTACK_HOOKS_LOG_LEVEL } else { 'minimal' }
        $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
        $retentionDaysRaw = if ($env:VSTACK_HOOK_RETENTION_DAYS) { $env:VSTACK_HOOK_RETENTION_DAYS } else { '7' }
        $retentionDays = 7
        if (-not ([int]::TryParse([string]$retentionDaysRaw, [ref]$retentionDays) -and $retentionDays -gt 0)) {
          $retentionDays = 7
        }
        try {
          if (Test-Path -LiteralPath $logRoot) {
            $cutoffDay = (Get-Date).ToUniversalTime().AddDays(-$retentionDays).ToString('yyyyMMdd')
            Get-ChildItem -LiteralPath $logRoot -Directory -ErrorAction Stop |
              Where-Object { $_.Name -match '^\d{8}$' -and $_.Name -lt $cutoffDay } |
              ForEach-Object { Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
          }
        } catch {}
        $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
        New-Item -ItemType Directory -Force -Path $logDir | Out-Null
        if ($logLevel -eq 'off') { exit 0 }
        if ($logLevel -eq 'verbose') {
          Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $inputText
          exit 0
        }

        $scriptStart = Get-Date
        $unknownEventsPath = Join-Path $logDir 'hook-agent-call-unknown-events.tsv'

        function Get-PathValue {
          param([object]$Object, [string]$Path)
          $current = $Object
          foreach ($part in $Path.Split('.')) {
            if ($null -eq $current) { return $null }
            $prop = $current.PSObject.Properties[$part]
            if ($null -eq $prop) { return $null }
            $current = $prop.Value
          }
          return $current
        }

        function Get-FirstString {
          param([object]$Object, [string[]]$Paths)
          foreach ($path in $Paths) {
            $value = Get-PathValue -Object $Object -Path $path
            if ($null -ne $value -and [string]$value -ne '') { return [string]$value }
          }
          return $null
        }

        function Add-UnknownEventCounter {
          param(
            [string]$Path,
            [string]$SessionId,
            [string]$Reason
          )

          $counts = @{}
          if (Test-Path $Path) {
            foreach ($line in (Get-Content -Path $Path)) {
              if ([string]::IsNullOrWhiteSpace($line)) { continue }
              $parts = $line -split "`t"
              if ($parts.Count -lt 2) { continue }

              $sid = [string]$parts[0]
              $why = [string]$parts[1]
              $count = 1
              if ($parts.Count -ge 3) {
                $parsedCount = 0
                if ([int]::TryParse([string]$parts[2], [ref]$parsedCount)) {
                  $count = [int][Math]::Max(0, $parsedCount)
                }
              }

              $key = "$sid`t$why"
              if (-not $counts.ContainsKey($key)) { $counts[$key] = 0 }
              $counts[$key] += $count
            }
          }

          $target = "$SessionId`t$Reason"
          if (-not $counts.ContainsKey($target)) { $counts[$target] = 0 }
          $counts[$target] += 1

          $rows = foreach ($entry in ($counts.GetEnumerator() | Sort-Object Name)) {
            "{0}`t{1}" -f $entry.Name, $entry.Value
          }
          Set-Content -Path $Path -Value $rows
        }

        $payload = $null
        try { $payload = $inputText | ConvertFrom-Json -ErrorAction Stop } catch {}

        $sessionId = 'unknown-session'
        $actorName = 'unknown'
        $actorType = 'unknown'
        $toolName = 'unknown'
        $toolCallId = 'unknown'
        $delegatedAgentName = 'unknown'
        $modelUsed = 'unknown'

        if ($null -ne $payload) {
          $sessionIdCandidate = Get-FirstString -Object $payload -Paths @('sessionId', 'session_id', 'conversationId', 'conversation_id', 'chatId', 'chat_id')
          if ($sessionIdCandidate) { $sessionId = $sessionIdCandidate }

          $actorNameCandidate = Get-FirstString -Object $payload -Paths @('actorName', 'actor_name', 'subagentName', 'subagent_name', 'agentName', 'agent_name')
          if ($actorNameCandidate) { $actorName = $actorNameCandidate }

          $actorTypeCandidate = Get-FirstString -Object $payload -Paths @('actorType', 'actor_type')
          if ($actorTypeCandidate) { $actorType = $actorTypeCandidate }

          $toolNameCandidate = Get-FirstString -Object $payload -Paths @('toolName', 'tool_name', 'recipient_name', 'tool.name', 'toolCall.name', 'toolCall.toolName', 'tool_call.name', 'tool_call.tool_name')
          if ($toolNameCandidate) { $toolName = $toolNameCandidate }

          $toolCallIdCandidate = Get-FirstString -Object $payload -Paths @('toolCallId', 'tool_call_id', 'callId', 'call_id', 'toolCall.id', 'tool_call.id')
          if ($toolCallIdCandidate) { $toolCallId = $toolCallIdCandidate }

          $delegatedCandidate = Get-FirstString -Object $payload -Paths @('delegatedAgentName', 'delegated_agent_name', 'runSubagent.agentName', 'runSubagent.agent_name', 'arguments.agentName', 'arguments.agent_name', 'args.agentName', 'args.agent_name', 'tool.arguments.agentName', 'tool.arguments.agent_name', 'toolCall.arguments.agentName', 'toolCall.arguments.agent_name', 'tool_call.arguments.agentName', 'tool_call.arguments.agent_name')
          if ($delegatedCandidate) { $delegatedAgentName = $delegatedCandidate }

          $modelCandidate = Get-FirstString -Object $payload -Paths @('model', 'modelName', 'model_name', 'toolModel', 'tool_model', 'toolCall.model', 'tool_call.model', 'arguments.model', 'arguments.modelName', 'arguments.model_name', 'args.model', 'args.modelName', 'args.model_name', 'tool.arguments.model', 'tool.arguments.modelName', 'tool.arguments.model_name', 'toolCall.arguments.model', 'toolCall.arguments.modelName', 'toolCall.arguments.model_name', 'tool_call.arguments.model', 'tool_call.arguments.modelName', 'tool_call.arguments.model_name')
          if ($modelCandidate) { $modelUsed = $modelCandidate }
        }

        if ($actorType -eq 'unknown') {
          if ($actorName -match 'subagent') {
            $actorType = 'subagent'
          } elseif ($actorName -ne 'unknown') {
            $actorType = 'agent'
          }
        }

        if ($toolName -eq 'unknown') {
          $toolNameMatch = [regex]::Match($inputText, '[A-Za-z_][A-Za-z0-9_]*\.[A-Za-z_][A-Za-z0-9_]*')
          if ($toolNameMatch.Success) { $toolName = $toolNameMatch.Value }
        }

        if ($toolName -eq 'runSubagent' -and $delegatedAgentName -eq 'unknown' -and $null -ne $payload) {
          $delegatedFallback = Get-FirstString -Object $payload -Paths @('agentName', 'agent_name')
          if ($delegatedFallback) { $delegatedAgentName = $delegatedFallback }
        }

        if ($actorName -eq 'unknown' -and $delegatedAgentName -eq 'unknown' -and $toolName -ne 'runSubagent') {
          Add-UnknownEventCounter -Path $unknownEventsPath -SessionId $sessionId -Reason 'preToolUse_unknown_context'
          exit 0
        }

        $eventName = if ($toolName -eq 'runSubagent') { 'delegationStart' } else { 'preToolUse' }

        $sizeBytes = [System.Text.Encoding]::UTF8.GetByteCount($inputText)
        $hookExecutionMs = [int][Math]::Max(0, ((Get-Date) - $scriptStart).TotalMilliseconds)
        $record = @{
          timestamp = (Get-Date).ToUniversalTime().ToString('o')
          event = $eventName
          session_id = $sessionId
          actor_name = $actorName
          actor_type = $actorType
          tool_name = $toolName
          delegated_agent_name = $delegatedAgentName
          model_used = $modelUsed
          size_bytes = $sizeBytes
          estimated_tokens = [int][math]::Ceiling($sizeBytes / 4.0)
          hook_execution_ms = $hookExecutionMs
        } | ConvertTo-Json -Compress
        Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $record
      cwd: "."
      timeoutSec: 5

  postToolUse:
    - type: command
      description: |
        Log tool result events with best-effort actor, delegation, and model metadata.
      bash: |
        script_start_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_start_ms" ]; then
          script_start_ms="$(( $(date +%s) * 1000 ))"
        fi
        input="$(cat)"
        log_level="${VSTACK_HOOKS_LOG_LEVEL:-minimal}"
        log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
        retention_days="${VSTACK_HOOK_RETENTION_DAYS:-7}"
        if ! printf '%s' "$retention_days" | grep -Eq '^[1-9][0-9]*$'; then
          retention_days=7
        fi
        if [ -d "$log_root" ]; then
          cutoff_day="$(date -u -d "$retention_days days ago" +%Y%m%d 2>/dev/null || true)"
          if [ -n "$cutoff_day" ]; then
            for day_dir in "$log_root"/*; do
              [ -d "$day_dir" ] || continue
              day_name="$(basename "$day_dir")"
              case "$day_name" in
                [0-9][0-9][0-9][0-9][0-1][0-9][0-3][0-9]) ;;
                *) continue ;;
              esac
              if [ "$day_name" -lt "$cutoff_day" ]; then
                rm -rf "$day_dir" || true
              fi
            done
          fi
        fi
        log_dir="$log_root/$(date -u +%Y%m%d)"
        mkdir -p "$log_dir"
        if [ "$log_level" = "off" ]; then
          exit 0
        fi
        if [ "$log_level" = "verbose" ]; then
          printf '%s\n' "$input" >> "$log_dir/hook-agent-call.log"
          exit 0
        fi

        ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        unknown_events_file="$log_dir/hook-agent-call-unknown-events.tsv"

        extract_json_string() {
          key="$1"
          printf '%s' "$input" | sed -n "s/.*\"${key}\"[[:space:]]*:[[:space:]]*\"\\([^\"]*\\)\".*/\\1/p" | head -n1
        }

        increment_unknown_event() {
          sid="$1"
          reason="$2"
          tmp_file="$unknown_events_file.tmp.$$"
          if [ -f "$unknown_events_file" ]; then
            awk -F '\t' -v sid="$sid" -v reason="$reason" 'BEGIN { OFS="\t" }
              NF >= 2 {
                key = $1 SUBSEP $2
                count = 1
                if (NF >= 3 && $3 ~ /^[0-9]+$/) {
                  count = $3 + 0
                }
                counts[key] += count
              }
              END {
                target = sid SUBSEP reason
                counts[target] += 1
                for (k in counts) {
                  split(k, parts, SUBSEP)
                  print parts[1], parts[2], counts[k]
                }
              }' "$unknown_events_file" > "$tmp_file" && mv "$tmp_file" "$unknown_events_file"
          else
            printf '%s\t%s\t1\n' "$sid" "$reason" > "$unknown_events_file"
          fi
        }

        session_id="$(extract_json_string sessionId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string session_id)"
        [ -z "$session_id" ] && session_id="$(extract_json_string conversationId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string conversation_id)"
        [ -z "$session_id" ] && session_id="$(extract_json_string chatId)"
        [ -z "$session_id" ] && session_id="$(extract_json_string chat_id)"
        [ -z "$session_id" ] && session_id="unknown-session"

        actor_name="$(extract_json_string actorName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string actor_name)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string subagentName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string subagent_name)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string agentName)"
        [ -z "$actor_name" ] && actor_name="$(extract_json_string agent_name)"
        [ -z "$actor_name" ] && actor_name="unknown"

        actor_type="$(extract_json_string actorType)"
        [ -z "$actor_type" ] && actor_type="$(extract_json_string actor_type)"
        if [ -z "$actor_type" ]; then
          if printf '%s' "$actor_name" | grep -qi 'subagent'; then
            actor_type="subagent"
          elif [ "$actor_name" != "unknown" ]; then
            actor_type="agent"
          else
            actor_type="unknown"
          fi
        fi

        tool_name="$(extract_json_string toolName)"
        [ -z "$tool_name" ] && tool_name="$(extract_json_string tool_name)"
        [ -z "$tool_name" ] && tool_name="$(extract_json_string recipient_name)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"toolName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"tool_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_name" ] && tool_name="$(printf '%s' "$input" | grep -Eo '[A-Za-z_][A-Za-z0-9_]*\.[A-Za-z_][A-Za-z0-9_]*' | head -n1)"
        [ -z "$tool_name" ] && tool_name="unknown"

        delegated_agent_name="unknown"
        if [ "$tool_name" = "runSubagent" ]; then
          delegated_agent_name="$(extract_json_string delegatedAgentName)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(extract_json_string delegated_agent_name)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(extract_json_string agentName)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(extract_json_string agent_name)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(printf '%s' "$input" | sed -n 's/.*"runSubagent"[[:space:]]*:[[:space:]]*{[^}]*"agentName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(printf '%s' "$input" | sed -n 's/.*"runSubagent"[[:space:]]*:[[:space:]]*{[^}]*"agent_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"agentName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"agent_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          [ -z "$delegated_agent_name" ] && delegated_agent_name="unknown"
        fi

        tool_call_id="$(extract_json_string toolCallId)"
        [ -z "$tool_call_id" ] && tool_call_id="$(extract_json_string tool_call_id)"
        [ -z "$tool_call_id" ] && tool_call_id="$(extract_json_string callId)"
        [ -z "$tool_call_id" ] && tool_call_id="$(extract_json_string call_id)"
        [ -z "$tool_call_id" ] && tool_call_id="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_call_id" ] && tool_call_id="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$tool_call_id" ] && tool_call_id="unknown"

        model_used="$(extract_json_string model)"
        [ -z "$model_used" ] && model_used="$(extract_json_string modelName)"
        [ -z "$model_used" ] && model_used="$(extract_json_string model_name)"
        [ -z "$model_used" ] && model_used="$(extract_json_string toolModel)"
        [ -z "$model_used" ] && model_used="$(extract_json_string tool_model)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"args"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"toolCall"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"modelName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="$(printf '%s' "$input" | sed -n 's/.*"tool_call"[[:space:]]*:[[:space:]]*{[^}]*"arguments"[[:space:]]*:[[:space:]]*{[^}]*"model_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        [ -z "$model_used" ] && model_used="unknown"

        if [ "$actor_name" = "unknown" ] && [ "$delegated_agent_name" = "unknown" ] && [ "$tool_name" != "runSubagent" ]; then
          increment_unknown_event "$session_id" "postToolUse_unknown_context"
          exit 0
        fi

        event_name="postToolUse"
        if [ "$tool_name" = "runSubagent" ]; then
          event_name="delegationEnd"
        fi

        bytes="$(printf '%s' "$input" | wc -c | tr -d ' ')"
        est_tokens="$(( (bytes + 3) / 4 ))"
        script_end_ms="$(date +%s%3N 2>/dev/null || true)"
        if [ -z "$script_end_ms" ]; then
          script_end_ms="$(( $(date +%s) * 1000 ))"
        fi
        hook_execution_ms="$((script_end_ms - script_start_ms))"

        printf '{"timestamp":"%s","event":"%s","session_id":"%s","actor_name":"%s","actor_type":"%s","tool_name":"%s","delegated_agent_name":"%s","model_used":"%s","size_bytes":%s,"estimated_tokens":%s,"hook_execution_ms":%s}\n' \
          "$ts" "$event_name" "$session_id" "$actor_name" "$actor_type" "$tool_name" "$delegated_agent_name" "$model_used" "$bytes" "$est_tokens" "$hook_execution_ms" >> "$log_dir/hook-agent-call.log"
      powershell: |
        $inputText = [Console]::In.ReadToEnd()
        $logLevel = if ($env:VSTACK_HOOKS_LOG_LEVEL) { $env:VSTACK_HOOKS_LOG_LEVEL } else { 'minimal' }
        $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
        $retentionDaysRaw = if ($env:VSTACK_HOOK_RETENTION_DAYS) { $env:VSTACK_HOOK_RETENTION_DAYS } else { '7' }
        $retentionDays = 7
        if (-not ([int]::TryParse([string]$retentionDaysRaw, [ref]$retentionDays) -and $retentionDays -gt 0)) {
          $retentionDays = 7
        }
        try {
          if (Test-Path -LiteralPath $logRoot) {
            $cutoffDay = (Get-Date).ToUniversalTime().AddDays(-$retentionDays).ToString('yyyyMMdd')
            Get-ChildItem -LiteralPath $logRoot -Directory -ErrorAction Stop |
              Where-Object { $_.Name -match '^\d{8}$' -and $_.Name -lt $cutoffDay } |
              ForEach-Object { Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
          }
        } catch {}
        $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
        New-Item -ItemType Directory -Force -Path $logDir | Out-Null
        if ($logLevel -eq 'off') { exit 0 }
        if ($logLevel -eq 'verbose') {
          Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $inputText
          exit 0
        }

        $scriptStart = Get-Date
        $unknownEventsPath = Join-Path $logDir 'hook-agent-call-unknown-events.tsv'

        function Get-PathValue {
          param([object]$Object, [string]$Path)
          $current = $Object
          foreach ($part in $Path.Split('.')) {
            if ($null -eq $current) { return $null }
            $prop = $current.PSObject.Properties[$part]
            if ($null -eq $prop) { return $null }
            $current = $prop.Value
          }
          return $current
        }

        function Get-FirstString {
          param([object]$Object, [string[]]$Paths)
          foreach ($path in $Paths) {
            $value = Get-PathValue -Object $Object -Path $path
            if ($null -ne $value -and [string]$value -ne '') { return [string]$value }
          }
          return $null
        }

        function Add-UnknownEventCounter {
          param(
            [string]$Path,
            [string]$SessionId,
            [string]$Reason
          )

          $counts = @{}
          if (Test-Path $Path) {
            foreach ($line in (Get-Content -Path $Path)) {
              if ([string]::IsNullOrWhiteSpace($line)) { continue }
              $parts = $line -split "`t"
              if ($parts.Count -lt 2) { continue }

              $sid = [string]$parts[0]
              $why = [string]$parts[1]
              $count = 1
              if ($parts.Count -ge 3) {
                $parsedCount = 0
                if ([int]::TryParse([string]$parts[2], [ref]$parsedCount)) {
                  $count = [int][Math]::Max(0, $parsedCount)
                }
              }

              $key = "$sid`t$why"
              if (-not $counts.ContainsKey($key)) { $counts[$key] = 0 }
              $counts[$key] += $count
            }
          }

          $target = "$SessionId`t$Reason"
          if (-not $counts.ContainsKey($target)) { $counts[$target] = 0 }
          $counts[$target] += 1

          $rows = foreach ($entry in ($counts.GetEnumerator() | Sort-Object Name)) {
            "{0}`t{1}" -f $entry.Name, $entry.Value
          }
          Set-Content -Path $Path -Value $rows
        }

        $payload = $null
        try { $payload = $inputText | ConvertFrom-Json -ErrorAction Stop } catch {}

        $sessionId = 'unknown-session'
        $actorName = 'unknown'
        $actorType = 'unknown'
        $toolName = 'unknown'
        $toolCallId = 'unknown'
        $delegatedAgentName = 'unknown'
        $modelUsed = 'unknown'

        if ($null -ne $payload) {
          $sessionIdCandidate = Get-FirstString -Object $payload -Paths @('sessionId', 'session_id', 'conversationId', 'conversation_id', 'chatId', 'chat_id')
          if ($sessionIdCandidate) { $sessionId = $sessionIdCandidate }

          $actorNameCandidate = Get-FirstString -Object $payload -Paths @('actorName', 'actor_name', 'subagentName', 'subagent_name', 'agentName', 'agent_name')
          if ($actorNameCandidate) { $actorName = $actorNameCandidate }

          $actorTypeCandidate = Get-FirstString -Object $payload -Paths @('actorType', 'actor_type')
          if ($actorTypeCandidate) { $actorType = $actorTypeCandidate }

          $toolNameCandidate = Get-FirstString -Object $payload -Paths @('toolName', 'tool_name', 'recipient_name', 'tool.name', 'toolCall.name', 'toolCall.toolName', 'tool_call.name', 'tool_call.tool_name')
          if ($toolNameCandidate) { $toolName = $toolNameCandidate }

          $toolCallIdCandidate = Get-FirstString -Object $payload -Paths @('toolCallId', 'tool_call_id', 'callId', 'call_id', 'toolCall.id', 'tool_call.id')
          if ($toolCallIdCandidate) { $toolCallId = $toolCallIdCandidate }

          $delegatedCandidate = Get-FirstString -Object $payload -Paths @('delegatedAgentName', 'delegated_agent_name', 'runSubagent.agentName', 'runSubagent.agent_name', 'arguments.agentName', 'arguments.agent_name', 'args.agentName', 'args.agent_name', 'tool.arguments.agentName', 'tool.arguments.agent_name', 'toolCall.arguments.agentName', 'toolCall.arguments.agent_name', 'tool_call.arguments.agentName', 'tool_call.arguments.agent_name')
          if ($delegatedCandidate) { $delegatedAgentName = $delegatedCandidate }

          $modelCandidate = Get-FirstString -Object $payload -Paths @('model', 'modelName', 'model_name', 'toolModel', 'tool_model', 'toolCall.model', 'tool_call.model', 'arguments.model', 'arguments.modelName', 'arguments.model_name', 'args.model', 'args.modelName', 'args.model_name', 'tool.arguments.model', 'tool.arguments.modelName', 'tool.arguments.model_name', 'toolCall.arguments.model', 'toolCall.arguments.modelName', 'toolCall.arguments.model_name', 'tool_call.arguments.model', 'tool_call.arguments.modelName', 'tool_call.arguments.model_name')
          if ($modelCandidate) { $modelUsed = $modelCandidate }
        }

        if ($actorType -eq 'unknown') {
          if ($actorName -match 'subagent') {
            $actorType = 'subagent'
          } elseif ($actorName -ne 'unknown') {
            $actorType = 'agent'
          }
        }

        if ($toolName -eq 'unknown') {
          $toolNameMatch = [regex]::Match($inputText, '[A-Za-z_][A-Za-z0-9_]*\.[A-Za-z_][A-Za-z0-9_]*')
          if ($toolNameMatch.Success) { $toolName = $toolNameMatch.Value }
        }

        if ($toolName -eq 'runSubagent' -and $delegatedAgentName -eq 'unknown' -and $null -ne $payload) {
          $delegatedFallback = Get-FirstString -Object $payload -Paths @('agentName', 'agent_name')
          if ($delegatedFallback) { $delegatedAgentName = $delegatedFallback }
        }

        if ($actorName -eq 'unknown' -and $delegatedAgentName -eq 'unknown' -and $toolName -ne 'runSubagent') {
          Add-UnknownEventCounter -Path $unknownEventsPath -SessionId $sessionId -Reason 'postToolUse_unknown_context'
          exit 0
        }

        $eventName = if ($toolName -eq 'runSubagent') { 'delegationEnd' } else { 'postToolUse' }

        $sizeBytes = [System.Text.Encoding]::UTF8.GetByteCount($inputText)
        $hookExecutionMs = [int][Math]::Max(0, ((Get-Date) - $scriptStart).TotalMilliseconds)
        $record = @{
          timestamp = (Get-Date).ToUniversalTime().ToString('o')
          event = $eventName
          session_id = $sessionId
          actor_name = $actorName
          actor_type = $actorType
          tool_name = $toolName
          delegated_agent_name = $delegatedAgentName
          model_used = $modelUsed
          size_bytes = $sizeBytes
          estimated_tokens = [int][math]::Ceiling($sizeBytes / 4.0)
          hook_execution_ms = $hookExecutionMs
        } | ConvertTo-Json -Compress
        Add-Content -Path (Join-Path $logDir 'hook-agent-call.log') -Value $record
      cwd: "."
      timeoutSec: 5
