version: 20260510003

metadata:
  name: post-edit-format
  description: |
    Code quality enforcement hook. Runs 'make format' when VSTACK_HOOKS_MODE=enforce
    on edit-like tools. Central audit logging is handled by session-audit.
  log:
    name: hook-quality-alerts.log
    retention_days: 7
  purpose: quality
  security_level: low
  mode_default: audit
  execution_context: copilot-hook-runtime
  dependencies:
    required: []
    optional:
      - make

hooks:
  postToolUse:
    - type: command
      description: |
        Optionally run format in enforce mode; write alerts only on failures.
      bash: |
        input="$(cat)"
        log_name="${VSTACK_HOOK_LOG_NAME:-hook-quality-alerts.log}"
        log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
        log_dir="$log_root/$(date -u +%Y%m%d)"
        mkdir -p "$log_dir"
        log_path="$log_dir/$log_name"
        mode="${VSTACK_HOOKS_MODE:-audit}"
        if [ "$mode" != "enforce" ]; then
          exit 0
        fi
        if printf '%s' "$input" | grep -Eq '"toolName"[[:space:]]*:[[:space:]]*"(edit|create|write|replace)"'; then
          if [ -f Makefile ] && command -v make >/dev/null 2>&1; then
            make format >/dev/null 2>&1 || printf '%s\n' 'format-run-failed' >> "$log_path"
          else
            printf '%s\n' 'format-skipped-missing-make-or-makefile' >> "$log_path"
          fi
        fi
      powershell: |
        $inputText = [Console]::In.ReadToEnd()
        $logName = if ($env:VSTACK_HOOK_LOG_NAME) { $env:VSTACK_HOOK_LOG_NAME } else { 'hook-quality-alerts.log' }
        $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
        $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
        New-Item -ItemType Directory -Force -Path $logDir | Out-Null
        $logPath = Join-Path $logDir $logName
        $mode = if ($env:VSTACK_HOOKS_MODE) { $env:VSTACK_HOOKS_MODE } else { 'audit' }
        if ($mode -ne 'enforce') {
          exit 0
        }
        try {
          $payload = $inputText | ConvertFrom-Json -ErrorAction Stop
        } catch {
          exit 0
        }
        if ($payload.toolName -match '^(edit|create|write|replace)$') {
          if ((Test-Path Makefile) -and (Get-Command make -ErrorAction SilentlyContinue)) {
            make format *> $null
            if ($LASTEXITCODE -ne 0) {
              Add-Content -Path $logPath -Value 'format-run-failed'
            }
          } else {
            Add-Content -Path $logPath -Value 'format-skipped-missing-make-or-makefile'
          }
        }
      cwd: "."
      timeoutSec: 30
