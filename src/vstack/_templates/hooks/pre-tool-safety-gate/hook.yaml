version: 20260510003

metadata:
  name: pre-tool-safety-gate
  description: |
    Destructive operation safety gate. Central audit logging is handled by session-audit.
    In enforce mode, blocks dangerous commands (rm -rf /, DROP TABLE, git reset --hard)
    with explicit deny response.
  log:
    name: hook-security-alerts.log
    retention_days: 30
  purpose: security
  security_level: high
  mode_default: audit
  execution_context: copilot-hook-runtime
  dependencies:
    required: []
    optional: []

hooks:
  preToolUse:
    - type: command
      description: |
        Check for destructive bash patterns and block in enforce mode.
        Logs only policy decisions and errors in this hook.
      bash: |
        mode="${VSTACK_HOOKS_MODE:-audit}"
        if [ "$mode" != "enforce" ]; then
          exit 0
        fi
        input="$(cat)"
        append_log() {
          log_name="${VSTACK_HOOK_LOG_NAME:-hook-security-alerts.log}"
          log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
          log_dir="$log_root/$(date -u +%Y%m%d)"
          mkdir -p "$log_dir"
          printf '%s\n' "$1" >> "$log_dir/$log_name"
        }
        tool_name="$(printf '%s' "$input" | sed -n 's/.*"toolName"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
        if [ -z "$tool_name" ]; then
          append_log 'payload-parse-failed'
          echo '{"permissionDecision":"deny","permissionDecisionReason":"Blocked request because payload could not be validated in enforce mode"}'
          exit 0
        fi
        if [ "$tool_name" = "bash" ] && \
           printf '%s' "$input" | grep -Eiq 'rm -rf /|mkfs|dd if=|DROP TABLE|TRUNCATE TABLE|git reset --hard|git clean -fdx|shutdown -h|shutdown now|reboot|poweroff|halt'; then
          append_log 'destructive-command-blocked'
          echo '{"permissionDecision":"deny","permissionDecisionReason":"Blocked potentially destructive shell command by vstack pre-tool safety policy"}'
        fi
      powershell: |
        $mode = if ($env:VSTACK_HOOKS_MODE) { $env:VSTACK_HOOKS_MODE } else { 'audit' }
        if ($mode -ne 'enforce') {
          exit 0
        }
        $inputText = [Console]::In.ReadToEnd()
        function Write-HookLog {
          param([string]$Message)
          $logName = if ($env:VSTACK_HOOK_LOG_NAME) { $env:VSTACK_HOOK_LOG_NAME } else { 'hook-security-alerts.log' }
          $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
          $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
          New-Item -ItemType Directory -Force -Path $logDir | Out-Null
          Add-Content -Path (Join-Path $logDir $logName) -Value $Message
        }
        try {
          $payload = $inputText | ConvertFrom-Json -ErrorAction Stop
        } catch {
          Write-HookLog 'payload-parse-failed'
          @{ permissionDecision = 'deny'; permissionDecisionReason = 'Blocked request because payload could not be validated in enforce mode' } | ConvertTo-Json -Compress
          exit 0
        }
        if (-not $payload.toolName) {
          Write-HookLog 'payload-parse-failed'
          @{ permissionDecision = 'deny'; permissionDecisionReason = 'Blocked request because payload could not be validated in enforce mode' } | ConvertTo-Json -Compress
          exit 0
        }
        if ($payload.toolName -eq 'bash' -and $inputText -match 'rm -rf /|mkfs|dd if=|DROP TABLE|TRUNCATE TABLE|git reset --hard|git clean -fdx|shutdown -h|shutdown now|reboot|poweroff|halt') {
          Write-HookLog 'destructive-command-blocked'
          @{ permissionDecision = 'deny'; permissionDecisionReason = 'Blocked potentially destructive shell command by vstack pre-tool safety policy' } | ConvertTo-Json -Compress
        }
      cwd: "."
      timeoutSec: 15

  errorOccurred:
    - type: command
      description: |
        Log tool errors for incident investigation and debugging.
      bash: |
        log_root="${VSTACK_HOOK_LOG_DIR:-.vstack/logs}"
        log_dir="$log_root/$(date -u +%Y%m%d)"
        mkdir -p "$log_dir"
        printf '%s\n' "hook-error-occurred" >> "$log_dir/hook-errors.log"
      powershell: |
        $logRoot = if ($env:VSTACK_HOOK_LOG_DIR) { $env:VSTACK_HOOK_LOG_DIR } else { '.vstack/logs' }
        $logDir = Join-Path $logRoot (Get-Date).ToUniversalTime().ToString('yyyyMMdd')
        New-Item -ItemType Directory -Force -Path $logDir | Out-Null
        Add-Content -Path (Join-Path $logDir 'hook-errors.log') -Value 'hook-error-occurred'
      cwd: "."
      timeoutSec: 10
