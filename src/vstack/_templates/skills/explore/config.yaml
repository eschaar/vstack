name: explore
version: 20260611001
description: |
  Fast codebase exploration and technical Q&A. Uses broad-to-narrow search,
  parallel context gathering, and depth modes (`quick`, `medium`, `thorough`)
  to map architecture, find reusable patterns, and answer targeted questions
  without making code changes. Use when asked to "explore the repo", "where is
  X implemented", "how does this system work", or "find examples to reuse".
allowed-tools: 'execute read search'
argument-hint: '[repository or system to explore]'

license: MIT
compatibility: Requires a skills-compatible agent with repository file access and terminal command execution when needed.
metadata:
  owner: vstack
  maturity: stable
user-invocable: true
disable-model-invocation: false
