name: cloudformation
version: 20260502032
description: |
  Write, review, and refactor AWS CloudFormation templates. Covers template
  structure, parameter design, resource naming, stack outputs, cross-stack
  references, nested stacks, change sets, drift detection, rollback
  configuration, and security hardening. Use when asked to "write a
  CloudFormation template", "review this CFN stack", "create a SAM template",
  "add a CloudFormation resource", or "migrate from CDK to CloudFormation".
allowed-tools: 'execute read search edit'
argument-hint: '[resource type or stack name, e.g. VPC | RDS | ECS service | Lambda function]'

license: MIT
compatibility: Requires a skills-compatible agent with repository file access. Requires AWS CLI with appropriate IAM permissions for deploy and drift operations.
metadata:
  owner: vstack
  maturity: stable
user-invocable: true
disable-model-invocation: false
