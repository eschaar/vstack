name: terragrunt
version: 20260502031
description: |
  Write, review, and refactor Terragrunt configurations for DRY multi-environment
  infrastructure. Covers root and unit-level HCL structure, generate blocks,
  remote state inheritance, dependency blocks, inputs, mock outputs, and
  run-all workflows. Use when asked to "write Terragrunt", "set up Terragrunt",
  "DRY Terraform across environments", "configure Terragrunt dependencies",
  or "migrate from plain Terraform to Terragrunt".
argument-hint: '[scope: new layout | dependency graph | state migration | run-all workflow | security review]'

license: MIT
compatibility: Requires a skills-compatible agent with repository file access. Requires Terraform CLI and Terragrunt installed for plan/apply operations.
metadata:
  owner: vstack
  maturity: stable
user-invocable: true
disable-model-invocation: false
