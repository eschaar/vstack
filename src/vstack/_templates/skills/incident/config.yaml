name: incident
version: 20260503002
description: |
  Incident analysis and coordination. Guides timeline reconstruction, contributing
  factor identification, and action item definition. Delegates technical root cause
  analysis to `rca` and stakeholder documentation to `postmortem`. Use when asked
  to "incident review", "analyse this outage", "what went wrong?", or to coordinate
  a full incident response retrospective.
allowed-tools: 'execute read search edit'
argument-hint: '[incident or outage to analyse]'

license: MIT
compatibility: Requires a skills-compatible agent with repository file access and terminal command execution when needed.
metadata:
  owner: vstack
  maturity: stable
user-invocable: true
disable-model-invocation: false
