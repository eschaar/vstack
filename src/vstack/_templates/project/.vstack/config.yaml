# vstack project configuration
#
# vstack install  — first-run setup. Seeds this file if missing (never overwrites).
#                   Then runs init to generate .github/ artifacts from templates.
#                   Use once per project, or when onboarding a new machine.
#
# vstack init     — idempotent regeneration. Reads this file on every run.
#                   Safe to re-run in CI after pip install --upgrade vstack.
#
# This file is committed to git. It expresses stable project preferences —
# editing it is a deliberate choice that affects all future vstack init runs.

# Selective install exclusions — remove or comment out to install everything.
#
# exclude:
#   skills:
#     - terraform
#     - terragrunt
#     - helm
#     - k8s
#   instructions: all
#   prompts: all

# Root directory for generated agent artifact paths.
# Default: docs
#
# artifacts:
#   root: docs

# Pipeline workflow — seeded by vstack install, owned by this project.
#
# Edit stages, gates, hitl policy, and handoff prompts to match your team's process.
# version allows vstack to warn on schema changes after upgrades.
#
# gate: required   — stage always runs
# gate: optional   — stage may be skipped when its domain is unaffected
# gate: skip        — stage is never executed (explicit opt-out)
#
# hitl: always     — pipeline pauses for human approval before handoff (default for required)
# hitl: on-change  — pipeline pauses only when the stage made changes (default for optional)
# hitl: never      — pipeline continues without human approval (explicit opt-out)
#
# workflow:
#   version: 1
#   stages:
#     - role: product
#       gate: required
#       hitl: always
#       handoffs:
#         prompt: >
#           Product outputs are approved. Assess the current state and produce or
#           update the architecture as needed. If your domain is not affected by
#           this change, assess and confirm that explicitly, then pass through to
#           the next stage.
#     - role: architect
#       gate: required
#       hitl: always
#       handoffs:
#         prompt: >
#           Architecture outputs are approved. Assess the current state and produce
#           design specifications as needed. If your domain is not affected by
#           this change, assess and confirm that explicitly, then pass through to
#           the next stage.
#     - role: designer
#       gate: optional
#       hitl: on-change
#       handoffs:
#         prompt: >
#           Design outputs are approved. Assess the current state and implement
#           code and tests as needed. If your domain is not affected by this
#           change, assess and confirm that explicitly, then pass through to
#           engineering. If working on an issue, document findings in RCA or
#           post-mortem artifacts as relevant.
#     - role: engineer
#       gate: required
#       hitl: always
#       handoffs:
#         prompt: >
#           Implementation is approved. Assess the current state and verify the
#           implementation as needed — run tests, security checks, and performance
#           analysis. If this is an issue (bug, problem, or incident), also produce
#           or update an RCA and, if stakeholder impact is significant, a
#           post-mortem.
#     - role: tester
#       gate: required
#       hitl: always
#       handoffs:
#         prompt: >
#           Verification outputs are approved. Assess the current state and prepare
#           the release as needed. Create and/or update the relevant artifacts if
#           needed, as well as any sign-offs.
#     - role: release
#       gate: required
#       hitl: always
#       handoffs:
#         prompt: ""
